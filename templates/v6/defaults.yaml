# Site defaults for the v6 template set — one file, merged into every stack.
# Selection fields (compilers/mpi/gpu/target) are policy that resolves against
# any profile; a stack build may override any of them.
schema_version: 1

profile_contract:
  schema_version: 1

# --- selection policy (what to build, from what the profile reports) ---
compilers: baseline   # gcc-or-first; set to 'all' (fan out) or a list to widen
mpi:
  provider: openmpi
  source: auto        # use the platform MPI if the profile reports one, else build openmpi
gpu:
  archs: all
target: native

provider_scopes:
  compiler:
    default: vendor/linux
    platform_families:
      cray-pe: vendor/cray

# --- site conventions (rarely touched) ---
spack:
  floor: "1.1.1"

externals:
  openssl: system
  curl: system
  cray-libsci: system
  fabric_userspace: prefer_platform

modules:
  format: tcl
  exposure: front_door
  init_module: science_init
  module_root: science
  hierarchy_style: collapsed
  expose_provenance: true
  platform_module_policy: prereq

foundation_pins:
  zlib: "1.3.1"
  xz: "5.4.6"
  zstd: "1.5.6"

buildcache:
  spack_generation: "spack-{spack_version}/repo-{package_repo_generation}"
  payload_lane: "payload/{os_id}/glibc-{glibc}/{spack_generation}/{system}"

release:
  save_lockfiles: true
  save_manifest: true

helpers:
  inspector: available
  render: available
  ansible: available
